<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>User Login</h2>

<form method="POST">
    {% csrf_token %}

    <p>
        Username:
        <input type="text" name="username">
    </p>

    <p>
        Password:
        <input type="password" name="password">
    </p>

    <button type="submit">Login</button>

</form>

</body>
</html>
